{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto bg-glass glow-border p-8 rounded-2xl">
  <h2 class="text-3xl font-bold mb-6 gradient-text">{{ 'Add New Habit' if mode=='add' else 'Edit Habit' }}</h2>

  <form method="post" class="space-y-5">
    <input type="text" name="name" value="{{ habit.name if habit else '' }}" placeholder="Habit Name"
      class="w-full p-3 rounded-lg bg-white/10 text-white placeholder-gray-400 border border-white/20 focus:ring-2 focus:ring-indigo-500 outline-none" required>

    <div>
      <label class="block mb-1 font-medium text-gray-300">Category</label>
     <select name="category_id"
  class="w-full p-3 rounded-lg
         bg-[#1e1b4b]/60
         text-white
         border border-indigo-400/30
         focus:ring-2 focus:ring-indigo-500
         focus:outline-none
         appearance-none
         transition-all duration-200
         shadow-inner">
  {% for cat in categories %}
  <option value="{{cat.id}}"
          class="bg-[#0f0f2d] text-white"
          {% if habit and habit.category_id==cat.id %}selected{% endif %}>
    {{ cat.icon if cat.icon else '' }} {{ cat.name }}
  </option>
  {% endfor %}
</select>

    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-300">Difficulty</label>
      <select name="difficulty" class="w-full p-3 rounded-lg bg-white/10 text-white border border-white/20 focus:ring-2 focus:ring-indigo-500">
        <option value="easy" {% if habit and habit.difficulty=='easy' %}selected{% endif %}>Easy</option>
        <option value="medium" {% if habit and habit.difficulty=='medium' %}selected{% endif %}>Medium</option>
        <option value="hard" {% if habit and habit.difficulty=='hard' %}selected{% endif %}>Hard</option>
      </select>
    </div>

    <div>
      <label class="block mb-1 font-medium text-gray-300">Frequency</label>
      <select name="frequency_type" class="w-full p-3 rounded-lg bg-white/10 text-white border border-white/20 focus:ring-2 focus:ring-indigo-500">
        <option value="daily" {% if habit and habit.frequency_type=='daily' %}selected{% endif %}>Daily</option>
        <option value="weekly" {% if habit and habit.frequency_type=='weekly' %}selected{% endif %}>Weekly</option>
        <option value="custom" {% if habit and habit.frequency_type=='custom' %}selected{% endif %}>Custom</option>
      </select>
    </div>

    <button type="submit" class="w-full btn-primary py-3 rounded-lg text-lg font-semibold tracking-wide">✨ {{ 'Add Habit' if mode=='add' else 'Update Habit' }}</button>
  </form>
</div>
{% endblock %}
